version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - run:
          name: Show Files
          command: ls -la

      - run:
          name: Build
          command: |
            chmod +x scripts/build.sh
            ./scripts/build.sh

      - run:
          name: Test
          command: |
            chmod +x scripts/test.sh
            ./scripts/test.sh

      - run:
          name: Security Scan
          command: |
            chmod +x scripts/security.sh
            ./scripts/security.sh

      - setup_remote_docker

      - run:
          name: Docker Build
          command: |
            docker build -t circleci-demo .

workflows:
  version: 2

  build:
    jobs:
      - build
